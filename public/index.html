<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code 1vs1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700;900&family=Patrick+Hand&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="deco deco-a">🎮</div>
      <div class="deco deco-b">⚡</div>
      <div class="deco deco-c">🔥</div>

      <section id="home" class="card view active">
        <p class="scribble">insert coin. challenge a rival.</p>
        <h1>Code 1vs1</h1>
        <p class="sub">Arcade coding battles in a funky handwritten universe.</p>

        <label class="label" for="nameInput">Your Gamer Tag</label>
        <input id="nameInput" type="text" maxlength="20" placeholder="NeonNinja" />


        <label class="label" for="languageSelect">Favorite Coding Language</label>
        <select id="languageSelect">
          <option>JavaScript</option>
          <option>Python</option>
          <option>C++</option>
          <option>Java</option>
          <option>C#</option>
          <option>Go</option>
          <option>Rust</option>
          <option>TypeScript</option>
        </select>

        <button id="spinBtn" class="spin">Spin Up an Opponent!</button>
        <p id="queueStatus" class="status"></p>
        <p id="streakHome" class="streak">Current streak: 0</p>

        <div class="mock-box">
          <p class="scribble small">mock coders online now</p>
          <ul id="mockList"></ul>
        </div>
      </section>

      <section id="arena" class="card view">
        <div class="arena-top">
          <h2 id="questionTitle"></h2>
          <span id="difficulty" class="pill"></span>
          <span id="opponent" class="pill opponent"></span>
          <span id="languageBadge" class="pill language"></span>
          <span id="timer" class="timer"></span>
        </div>
        <p id="questionPrompt" class="prompt"></p>
        <textarea id="editor" spellcheck="false"></textarea>
        <div class="actions">
          <button id="submitBtn">Submit Code</button>
          <button id="homeBtn" class="ghost">Back Home</button>
        </div>
        <p id="submissionStatus" class="status"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
